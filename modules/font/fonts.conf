<?xml version="1.0" ?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- look up Noto Color Emoji first: ensures emojis display using this font,
       rather than whatever glyph the main font happens to have. -->
  <match target="pattern">
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
  </match>
</fontconfig>
