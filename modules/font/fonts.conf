<?xml version="1.0" ?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- display emojis using Noto Color Emoji instead of whatever glyph the font happens to ship with. -->
  <alias>
    <family>Noto Sans Mono</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
